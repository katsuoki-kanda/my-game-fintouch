<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Pinch Game - UI Adjusted</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        
        #ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .hud { position: absolute; top: 20px; left: 20px; font-size: 28px; color: #0f0; text-shadow: 2px 2px 4px #000; }
        
        #msg { 
            position: absolute; 
            top: 10%; 
            width: 100%; 
            text-align: center; 
            font-size: 70px; 
            color: #ffff00; 
            text-shadow: 0 0 20px rgba(0,0,0,1), 0 0 10px rgba(0,0,0,1); 
            font-weight: bold; 
            z-index: 100; 
        }

        .question-area { 
            position: absolute; 
            top: 48%; 
            width: 100%; 
            display: flex; 
            justify-content: space-around; 
            transform: translateY(-50%); 
        }

        .hand-monitor { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: rgba(0,0,0,0.7); 
            padding: 30px; 
            border-radius: 40px; 
            min-width: 260px; 
            border: 4px solid #555; 
            transition: all 0.2s; 
        }
        
        .hand-monitor.left-side { border-color: #ff00ff; }
        .hand-monitor.right-side { border-color: #00ffff; }

        .target-num { font-size: 160px; font-weight: bold; color: #fff; line-height: 1; margin-bottom: 10px; }
        .finger-name { font-size: 36px; color: #ffaa00; font-weight: bold; margin-bottom: 10px; }
        
        .correct-highlight { border-color: #00ff00 !important; background: rgba(0, 255, 0, 0.3) !important; box-shadow: 0 0 40px #00ff00; }
        .correct-text { color: #00ff00 !important; text-shadow: 0 0 20px #00ff00; }
        
        .instruction-container {
            position: absolute;
            bottom: 15px; 
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 50;
        }

        .instruction { 
            text-align: center; 
            font-size: 26px; 
            color: #fff; 
            background: rgba(0,0,0,0.75); 
            padding: 10px 40px; 
            border-radius: 50px; 
            border: 1px solid rgba(255,255,255,0.2);
        }

        .debug-info { font-size: 14px; margin-top: 5px; color: #888; }
    </style>
</head>
<body>

    <video id="input_video" style="display:none;"></video>
    <canvas id="output_canvas"></canvas>

    <div id="ui-layer">
        <div class="hud">
            <div>SCORE: <span id="score">0</span></div>
            <div>TIME: <span id="timer">60</span></div>
        </div>
        
        <div id="msg">カメラ読み込み中...</div>

        <div class="question-area">
            <div id="box-l" class="hand-monitor left-side">
                <div class="finger-name" id="name-l">-</div>
                <div id="target-l" class="target-num">-</div>
                <div class="debug-info" id="debug-l">計測中</div>
            </div>
            <div id="box-r" class="hand-monitor right-side">
                <div class="finger-name" id="name-r">-</div>
                <div id="target-r" class="target-num">-</div>
                <div class="debug-info" id="debug-r">計測中</div>
            </div>
        </div>

        <div class="instruction-container">
            <div class="instruction">
                1:人差指 / 2:中指 / 3:薬指 ―― 親指と接触させて
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        const scoreEl = document.getElementById('score'), timerEl = document.getElementById('timer');
        const targetLEl = document.getElementById('target-l'), targetREl = document.getElementById('target-r');
        const nameLEl = document.getElementById('name-l'), nameREl = document.getElementById('name-r');
        const boxLEl = document.getElementById('box-l'), boxREl = document.getElementById('box-r');
        const debugLEl = document.getElementById('debug-l'), debugREl = document.getElementById('debug-r');
        const msgEl = document.getElementById('msg');

        let score = 0, timeLeft = 60, gameActive = false;
        let targetL = 0, targetR = 0;
        let lastSuccessTime = 0;
        let isFirstFrame = true;

        const fingerNames = { 1: "人差指", 2: "中指", 3: "薬指" };
        const PINCH_RATIO_THRESHOLD = 0.35; 

        // オーディオコンテキストをグローバルで保持（再利用するため）
        let audioCtx = null;

        function speak(text) {
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
        }

        function nextRound() {
            boxLEl.classList.remove('correct-highlight');
            boxREl.classList.remove('correct-highlight');
            targetLEl.classList.remove('correct-text');
            targetREl.classList.remove('correct-text');
            
            let nextL, nextR;
            do {
                nextL = Math.floor(Math.random() * 3) + 1;
                nextR = Math.floor(Math.random() * 3) + 1;
            } while (nextL === targetL && nextR === targetR);

            targetL = nextL;
            targetR = nextR;
            
            targetLEl.innerText = targetL;
            targetREl.innerText = targetR;
            nameLEl.innerText = fingerNames[targetL];
            nameREl.innerText = fingerNames[targetR];
        }

        function startGame() {
            if (gameActive) return;
            
            // 初回クリック/アクション時にオーディオコンテキストを初期化（ブラウザ制限対策）
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            score = 0; timeLeft = 60;
            scoreEl.innerText = score;
            gameActive = true;
            msgEl.innerText = ""; 
            speak("スタート");
            nextRound();
            
            const timer = setInterval(() => {
                if (!gameActive) { clearInterval(timer); return; }
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    gameActive = false;
                    msgEl.innerText = "終了！";
                    speak("スコアは" + score + "点です。");
                }
            }, 1000);
        }

        function getDist(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function detectSinglePinch(lm) {
            const handSize = getDist(lm[0], lm[17]);
            if (handSize < 0.01) return { id: 0, size: 0 };

            const threshold = handSize * PINCH_RATIO_THRESHOLD;
            const thumb = lm[4], index = lm[8], middle = lm[12], ring = lm[16];
            const d1 = getDist(thumb, index), d2 = getDist(thumb, middle), d3 = getDist(thumb, ring);

            let activeId = 0, touchCount = 0;
            if (d1 < threshold) { activeId = 1; touchCount++; }
            if (d2 < threshold) { activeId = 2; touchCount++; }
            if (d3 < threshold) { activeId = 3; touchCount++; }

            return { id: touchCount === 1 ? activeId : 0, size: handSize };
        }

        function onResults(results) {
            if (isFirstFrame) {
                msgEl.innerText = "片手を上げてスタート";
                isFirstFrame = false;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            let currentPinchL = 0, currentPinchR = 0;
            let anyHandRaised = false;

            if (results.multiHandLandmarks) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const pinchResult = detectSinglePinch(landmarks);
                    const pinch = pinchResult.id;
                    
                    if (landmarks[0].x > 0.5) {
                        currentPinchL = pinch;
                        debugLEl.innerText = "S:" + pinchResult.size.toFixed(2);
                    } else {
                        currentPinchR = pinch;
                        debugREl.innerText = "S:" + pinchResult.size.toFixed(2);
                    }

                    if (landmarks[0].y < 0.35) anyHandRaised = true;

                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 2});
                    drawLandmarks(canvasCtx, landmarks, {color: '#00ffff', radius: 3});
                }
            }

            if (!gameActive && anyHandRaised) startGame();

            if (gameActive) {
                if (currentPinchL === targetL) {
                    boxLEl.classList.add('correct-highlight');
                    targetLEl.classList.add('correct-text');
                } else {
                    boxLEl.classList.remove('correct-highlight');
                    targetLEl.classList.remove('correct-text');
                }

                if (currentPinchR === targetR) {
                    boxREl.classList.add('correct-highlight');
                    targetREl.classList.add('correct-text');
                } else {
                    boxREl.classList.remove('correct-highlight');
                    targetREl.classList.remove('correct-text');
                }

                if (currentPinchL === targetL && currentPinchR === targetR && (Date.now() - lastSuccessTime > 1200)) {
                    score++;
                    scoreEl.innerText = score;
                    msgEl.innerText = "OK!!";
                    lastSuccessTime = Date.now();
                    playBeep();
                    setTimeout(() => { if(gameActive) { msgEl.innerText = ""; nextRound(); } }, 700);
                }
            }
            canvasCtx.restore();
        }

        // 不具合修正: AudioContextを使い回し、レジュームするように変更
        function playBeep() {
            if (!audioCtx) return;
            
            // 中断されている場合は再開させる（スマホ対策）
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); 
            gain.connect(audioCtx.destination);
            
            osc.frequency.value = 1100;
            osc.start();
            
            // 滑らかに音を消す
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                await hands.send({image: videoElement});
            },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
