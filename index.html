<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Touch Game - Fingertip Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        #ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .hud { position: absolute; top: 20px; left: 20px; font-size: 28px; color: #0f0; text-shadow: 2px 2px 2px #000; }
        
        .question-area { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-around; transform: translateY(-50%); }
        .hand-monitor { display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.6); padding: 30px; border-radius: 40px; min-width: 250px; border: 2px solid #555; }
        
        .hand-monitor.left-side { border-color: #ff00ff; }
        .hand-monitor.right-side { border-color: #00ffff; }

        .target-num { font-size: 150px; font-weight: bold; color: #fff; line-height: 1; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .finger-name { font-size: 32px; color: #ffaa00; font-weight: bold; margin-bottom: 10px; }
        
        .correct-highlight { color: #ff0000 !important; text-shadow: 0 0 30px rgba(255,0,0,0.8); }
        
        #msg { position: absolute; top: 10%; width: 100%; text-align: center; font-size: 70px; color: #ffff00; text-shadow: 3px 3px 5px #000; }
        .instruction { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 24px; color: #fff; background: rgba(0,0,0,0.5); padding: 10px 0; }
        .status-text { font-size: 20px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <video id="input_video" style="display:none;" playsinline></video>
    <canvas id="output_canvas"></canvas>

    <div id="ui-layer">
        <div class="hud">
            <div>SCORE: <span id="score">0</span></div>
            <div>TIME: <span id="timer">60</span></div>
        </div>
        
        <div id="msg">カメラ読み込み中...</div>

        <div class="question-area">
            <div class="hand-monitor left-side">
                <div class="finger-name" id="name-l">-</div>
                <div id="target-l" class="target-num">-</div>
                <div class="status-text" style="color:#ff00ff;">画面左の手</div>
            </div>
            <div class="hand-monitor right-side">
                <div class="finger-name" id="name-r">-</div>
                <div id="target-r" class="target-num">-</div>
                <div class="status-text" style="color:#00ffff;">画面右の手</div>
            </div>
        </div>

        <div class="instruction">
            左右の指定された指先同士をくっつけて！
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        const scoreEl = document.getElementById('score'), timerEl = document.getElementById('timer');
        const targetLEl = document.getElementById('target-l'), targetREl = document.getElementById('target-r');
        const nameLEl = document.getElementById('name-l'), nameREl = document.getElementById('name-r');
        const msgEl = document.getElementById('msg');

        let score = 0, timeLeft = 60, gameActive = false;
        let targetL = 0, targetR = 0;
        let lastSuccessTime = 0;
        let isFirstFrame = true;

        // 【修正】オーディオコンテキストをグローバルで管理
        let audioCtx = null;

        // 【修正】オーディオ初期化関数
        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        const fingerMap = { 1: 4, 2: 8, 3: 12, 4: 16, 5: 20 };
        const fingerNames = { 1: "親指", 2: "人差指", 3: "中指", 4: "薬指", 5: "小指" };

        function speak(text) {
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
        }

        function nextRound() {
            targetLEl.classList.remove('correct-highlight');
            targetREl.classList.remove('correct-highlight');
            
            let nextL, nextR;
            do {
                nextL = Math.floor(Math.random() * 5) + 1;
                nextR = Math.floor(Math.random() * 5) + 1;
            } while (nextL === targetL && nextR === targetR);

            targetL = nextL;
            targetR = nextR;
            
            targetLEl.innerText = targetL;
            targetREl.innerText = targetR;
            nameLEl.innerText = fingerNames[targetL];
            nameREl.innerText = fingerNames[targetR];
        }

        function startGame() {
            if (gameActive) return;

            // 【修正】ゲーム開始時にオーディオを有効化
            initAudioContext();

            score = 0; timeLeft = 60;
            scoreEl.innerText = score;
            gameActive = true;
            msgEl.innerText = ""; 
            speak("スタート");
            nextRound();
            
            const timer = setInterval(() => {
                if (!gameActive) { clearInterval(timer); return; }
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    gameActive = false;
                    msgEl.innerText = "終了！";
                    speak(score + "点です。終了。");
                }
            }, 1000);
        }

        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2) + Math.pow(p1.z - p2.z, 2));
        }

        function onResults(results) {
            if (isFirstFrame) {
                msgEl.innerText = "両手を上げてスタート";
                isFirstFrame = false;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            let screenLeftHand = null;
            let screenRightHand = null;
            let startTrigger = false;

            if (results.multiHandLandmarks) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    
                    if (landmarks[0].x > 0.5) {
                        screenLeftHand = landmarks;
                    } else {
                        screenRightHand = landmarks;
                    }

                    if (landmarks[0].y < 0.3) startTrigger = true;

                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 2});
                    drawLandmarks(canvasCtx, landmarks, {color: '#ff0000', radius: 2});
                }
            }

            if (!gameActive && startTrigger && results.multiHandLandmarks?.length >= 2) startGame();

            if (gameActive && screenLeftHand && screenRightHand) {
                const pL = screenLeftHand[fingerMap[targetL]];
                const pR = screenRightHand[fingerMap[targetR]];
                const dist = getDistance(pL, pR);

                if (dist < 0.05 && (Date.now() - lastSuccessTime > 1200)) {
                    targetLEl.classList.add('correct-highlight');
                    targetREl.classList.add('correct-highlight');
                    
                    score++;
                    scoreEl.innerText = score;
                    msgEl.innerText = "Good!";
                    lastSuccessTime = Date.now();
                    playBeep();
                    
                    setTimeout(() => { 
                        if(gameActive) {
                            msgEl.innerText = "";
                            nextRound();
                        }
                    }, 600);
                }
            }

            canvasCtx.restore();
        }

        // 【修正】AudioContextを再利用し、スケジュールを安定化
        function playBeep() {
            initAudioContext();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.frequency.value = 880;
            const now = audioCtx.currentTime;
            
            osc.start(now);
            gain.gain.setValueAtTime(1, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
            osc.stop(now + 0.12);
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                await hands.send({image: videoElement});
            },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
